<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PolicyGuard RAG — Pipeline Trace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #1e3a8a;
      --surface:  #0f1e42;
      --surface2: #172448;
      --border:   #2a4080;
      --text:     #f1f5ff;
      --muted:    #93aad8;
      --accent:   #818cf8;

      --c-query:  #22d3ee;
      --c-embed:  #a78bfa;
      --c-chroma: #fb923c;
      --c-topk:   #34d399;
      --c-gate:   #fbbf24;
      --c-llm:    #818cf8;
      --c-ans:    #22c55e;
      --c-block:  #ef4444;

      --mono: 'Space Mono', monospace;
      --sans: 'Outfit', system-ui, sans-serif;
      --radius: 10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1e3a8a;
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 2.2rem 1rem 4rem;
      position: relative;
      animation: page-to-green linear both;
      animation-timeline: scroll(root block);
    }

    @keyframes page-to-green {
      0%   { background-color: #1e3a8a; }
      40%  { background-color: #1a3d72; }
      75%  { background-color: #0e4a30; }
      100% { background-color: #083d22; }
    }

    /* ─── SCROLL-DRIVEN GRADIENT ORBS ───────────────────────────────────── */
    .bg-orbs {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    /* Everything else sits above the orbs */
    header, .tab-bar, #panel-ingest, #panel-query { position: relative; z-index: 1; }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(110px);
      animation-timing-function: linear;
      animation-fill-mode: both;
      animation-timeline: scroll(root block);
    }

    .orb-1 {
      width: 70vw; height: 70vw;
      background: radial-gradient(circle, #4f6fdc 0%, #2a4ab8 40%, transparent 70%);
      top: -30vw; left: -20vw;
      opacity: 0.85;
      animation: orb1-drift linear both;
      animation-timeline: scroll(root block);
    }

    @keyframes orb1-drift {
      from { transform: translate(0, 0);      opacity: 0.85; }
      60%  { transform: translate(8%, 35%);   opacity: 0.45; }
      to   { transform: translate(12%, 55%);  opacity: 0.10; }
    }

    .orb-2 {
      width: 55vw; height: 55vw;
      background: radial-gradient(circle, #7c3aed 0%, #5b21b6 40%, transparent 70%);
      top: 25%; right: -20vw;
      opacity: 0.60;
      animation: orb2-drift linear both;
      animation-timeline: scroll(root block);
    }

    @keyframes orb2-drift {
      from { transform: translate(0, 0) scale(1);       opacity: 0.60; }
      55%  { transform: translate(-10%, -20%) scale(1.05); opacity: 0.35; }
      to   { transform: translate(-15%, -35%) scale(1.1); opacity: 0.08; }
    }

    .orb-3 {
      width: 50vw; height: 50vw;
      background: radial-gradient(circle, #0ea5e9 0%, #0369a1 40%, transparent 70%);
      bottom: -10%; left: 20%;
      opacity: 0.50;
      animation: orb3-drift linear both;
      animation-timeline: scroll(root block);
    }

    @keyframes orb3-drift {
      from { transform: translateY(0);    opacity: 0.50; }
      50%  { transform: translateY(-30%); opacity: 0.30; }
      to   { transform: translateY(-60%); opacity: 0.05; }
    }

    /* Green orb — fades in from bottom as user scrolls into results */
    .orb-4 {
      width: 80vw; height: 80vw;
      background: radial-gradient(circle, #10b981 0%, #059669 35%, transparent 70%);
      bottom: -30vw; left: 5%;
      opacity: 0;
      animation: orb4-rise linear both;
      animation-timeline: scroll(root block);
    }

    @keyframes orb4-rise {
      0%   { opacity: 0;    transform: translateY(0); }
      40%  { opacity: 0;    transform: translateY(0); }
      65%  { opacity: 0.55; transform: translateY(-20%); }
      100% { opacity: 0.90; transform: translateY(-55%); }
    }

    /* Teal accent orb — appears in the bottom-right corner */
    .orb-5 {
      width: 45vw; height: 45vw;
      background: radial-gradient(circle, #14b8a6 0%, #0d9488 40%, transparent 70%);
      bottom: 0; right: -10vw;
      opacity: 0;
      animation: orb5-appear linear both;
      animation-timeline: scroll(root block);
    }

    @keyframes orb5-appear {
      0%   { opacity: 0;    transform: translate(0, 0); }
      55%  { opacity: 0;    transform: translate(0, 0); }
      80%  { opacity: 0.45; transform: translate(-8%, -25%); }
      100% { opacity: 0.70; transform: translate(-12%, -45%); }
    }

    /* ─── HEADER ──────────────────────────────────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header-eyebrow {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    header h1 {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.4rem;
      letter-spacing: 0.03em;
    }

    /* ─── QUERY INPUT ─────────────────────────────────────────────────────── */
    .query-wrap {
      max-width: 700px;
      margin: 0 auto 2rem;
      display: flex;
      gap: 0.6rem;
    }

    .query-wrap input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--sans);
      font-size: 0.9rem;
      padding: 0.72rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .query-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.13);
    }

    .query-wrap input::placeholder { color: var(--muted); }

    /* ─── PARALLELOGRAM BUTTONS ─────────────────────────────────────────────── */
    .para-btn {
      position: relative;
      overflow: hidden;
      clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      padding: 0.68rem 2rem;
      text-transform: uppercase;
      white-space: nowrap;
      transition: background 0.22s, color 0.22s;
    }

    .para-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg,
        transparent 30%,
        rgba(255,255,255,0.09) 50%,
        transparent 70%);
      transform: translateX(-100%);
      transition: none;
      pointer-events: none;
    }

    .para-btn:hover:not(:disabled)::before {
      transform: translateX(100%);
      transition: transform 0.45s ease;
    }

    .para-btn:disabled { cursor: not-allowed; }

    @keyframes btn-pulse {
      0%, 100% { filter: drop-shadow(0 0 4px rgba(167,139,250,0.3)); }
      50%       { filter: drop-shadow(0 0 14px rgba(167,139,250,0.7)); }
    }

    /* RUN button — indigo palette */
    #q-btn {
      background: rgba(99, 102, 241, 0.07);
      border: 1.5px solid var(--accent);
      color: var(--accent);
    }

    #q-btn:hover:not(:disabled) {
      background: rgba(99,102,241,0.16);
      color: #fff;
      filter: drop-shadow(0 0 10px rgba(99,102,241,0.55))
              drop-shadow(0 0 24px rgba(99,102,241,0.25));
    }

    #q-btn:active:not(:disabled) {
      background: rgba(99,102,241,0.24);
      filter: drop-shadow(0 0 6px rgba(99,102,241,0.4));
    }

    /* ─── PARAM CONTROLS ──────────────────────────────────────────────────── */
    .controls-row {
      max-width: 700px;
      margin: 0 auto 1.6rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .param-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .param-label {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stepper {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      overflow: hidden;
    }

    .stepper button {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 700;
      line-height: 1;
      padding: 0.42rem 0.7rem;
      transition: background 0.15s, color 0.15s;
      user-select: none;
    }

    .stepper button:hover { background: var(--surface2); color: var(--text); }
    .stepper button:active { background: var(--border); }

    .stepper-val {
      font-family: var(--mono);
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text);
      min-width: 3.2rem;
      text-align: center;
      padding: 0.42rem 0.2rem;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    .param-group.highlight .stepper { border-color: var(--accent); }
    .param-group.highlight .param-label { color: var(--accent); }

    /* ─── GLASSMORPHISM — surfaces float above the orb field ────────────── */
    .graph-shell,
    .stage,
    .doc-sidebar {
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* ─── GRAPH SECTION ───────────────────────────────────────────────────── */
    .graph-section {
      max-width: 980px;
      margin: 0 auto 2.2rem;
    }

    .section-eyebrow {
      font-family: var(--mono);
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.55rem;
    }

    .graph-shell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      position: relative;
    }

    /* dot-grid backdrop on graph shell */
    .graph-shell::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(99,102,241,0.13) 1px, transparent 1px);
      background-size: 22px 22px;
      pointer-events: none;
      z-index: 0;
    }

    #rag-svg {
      display: block;
      width: 100%;
      height: auto;
      position: relative;
      z-index: 1;
      padding: 1.5rem 0.5rem 0.4rem;
    }

    /* ─── SVG INTERNALS ───────────────────────────────────────────────────── */
    .node-pulse {
      fill: none;
      stroke-width: 1.5;
    }

    @keyframes pulse-ring {
      0%   { r: 30; opacity: 0.7; }
      100% { r: 50; opacity: 0;   }
    }

    .node-pulse.pulsing {
      animation: pulse-ring 1.1s ease-out infinite;
    }

    .node-outer-ring {
      fill: none;
      stroke-width: 1.5;
      opacity: 0.18;
      transition: opacity 0.35s, stroke-width 0.35s;
    }

    .node-outer-ring.lit {
      opacity: 1;
      stroke-width: 2;
    }

    .node-bg {
      fill: var(--surface2);
      stroke-width: 1.8;
      transition: fill 0.3s;
    }

    .node-icon-text {
      font-size: 13px;
      text-anchor: middle;
      dominant-baseline: central;
      font-family: 'Segoe UI Emoji', 'Apple Color Emoji', var(--mono);
      pointer-events: none;
      transition: opacity 0.3s;
      opacity: 0.4;
    }

    .node-icon-text.lit { opacity: 1; }

    .node-label-text {
      font-size: 7px;
      text-anchor: middle;
      font-family: var(--mono);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      fill: var(--muted);
      transition: fill 0.35s;
    }

    .node-label-text.lit { fill: var(--text); }

    .node-sub-text {
      font-size: 5.5px;
      text-anchor: middle;
      font-family: var(--mono);
      fill: var(--muted);
      opacity: 0.55;
    }

    .node-data-text {
      font-size: 6px;
      text-anchor: middle;
      font-family: var(--mono);
      font-weight: 700;
      fill: transparent;
      transition: fill 0.4s;
    }

    .node-data-text.show { fill: var(--text); }

    /* connection lines */
    .conn {
      fill: none;
      stroke: var(--border);
      stroke-width: 1.5;
      stroke-dasharray: 4 6;
      animation: flow 1.5s linear infinite;
    }

    .conn.lit {
      stroke-width: 2;
      stroke-dasharray: 7 4;
      animation-duration: 0.45s;
    }

    @keyframes flow {
      from { stroke-dashoffset: 0; }
      to   { stroke-dashoffset: -10; }
    }

    /* arrow heads */
    .arrowhead {
      transition: fill 0.3s;
    }

    /* ─── STATUS LINE ─────────────────────────────────────────────────────── */
    .status-bar {
      padding: 0.55rem 1.4rem 0.8rem;
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      min-height: 2.2rem;
      transition: color 0.3s;
      position: relative;
      z-index: 1;
    }

    .status-bar::before {
      content: '// ';
      opacity: 0.5;
    }

    /* ─── ERROR ───────────────────────────────────────────────────────────── */
    #error-msg {
      max-width: 700px;
      margin: 0 auto 1.2rem;
      background: rgba(239,68,68,0.08);
      border: 1px solid var(--c-block);
      border-radius: var(--radius);
      color: var(--c-block);
      font-family: var(--mono);
      font-size: 0.75rem;
      padding: 0.6rem 0.9rem;
      display: none;
    }

    /* ─── STAGE DETAIL CARDS ─────────────────────────────────────────────── */
    .detail-section {
      max-width: 700px;
      margin: 0 auto;
    }

    .pipeline {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .stage {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.15rem 1.3rem;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.38s ease, transform 0.38s ease, border-color 0.4s;
    }

    .stage.visible { opacity: 1; transform: translateY(0); }

    .stage.gate-pass  { border-color: var(--c-ans); }
    .stage.gate-block { border-color: var(--c-block); }

    .connector {
      display: flex;
      justify-content: center;
      padding: 0.22rem 0;
      color: var(--border);
      font-size: 0.95rem;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .connector.visible { opacity: 1; }

    .stage-hd {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.85rem;
    }

    .stage-num {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .stage-title {
      font-family: var(--mono);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .badge {
      margin-left: auto;
      padding: 0.16rem 0.55rem;
      border-radius: 99px;
      font-family: var(--mono);
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .badge-pass  { background: rgba(34,197,94,0.14);  color: var(--c-ans);   }
    .badge-block { background: rgba(239,68,68,0.14);  color: var(--c-block); }

    /* kv pairs */
    .kv { display: grid; grid-template-columns: auto 1fr; gap: 0.3rem 1rem; font-size: 0.8rem; }
    .kv-k { color: var(--muted); }
    .kv-v { font-family: var(--mono); font-size: 0.73rem; color: var(--text); }

    /* question text */
    .q-text { font-size: 0.92rem; line-height: 1.55; font-weight: 500; }

    /* chunk list */
    .search-meta { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.6rem; }
    .search-meta strong { color: var(--text); font-family: var(--mono); }

    .chunk-list { display: flex; flex-direction: column; gap: 0.55rem; }

    .chunk-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 0.65rem 0.8rem;
    }

    .chunk-row {
      display: flex; align-items: center; gap: 0.45rem;
      font-size: 0.72rem; margin-bottom: 0.38rem;
    }

    .chunk-rank {
      background: rgba(99,102,241,0.18);
      color: var(--accent);
      border-radius: 4px;
      padding: 0.08rem 0.28rem;
      font-family: var(--mono); font-size: 0.62rem; font-weight: 700;
    }

    .chunk-doc { font-weight: 600; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .chunk-scores {
      font-family: var(--mono); font-size: 0.62rem; color: var(--muted);
      display: flex; gap: 0.55rem; flex-shrink: 0;
    }

    .bar-wrap { background: var(--bg); border-radius: 3px; height: 4px; overflow: hidden; margin-bottom: 0.4rem; }
    .bar { height: 100%; border-radius: 3px; }
    .bar-hi { background: var(--c-ans);   }
    .bar-md { background: var(--c-gate);  }
    .bar-lo { background: var(--c-block); }

    .chunk-exc { font-size: 0.72rem; color: var(--muted); line-height: 1.45;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .chunk-item.filtered {
      opacity: 0.42;
      border-style: dashed;
    }

    .chunk-item.filtered .chunk-doc { text-decoration: line-through; text-decoration-color: var(--muted); }

    .filtered-badge {
      background: rgba(239,68,68,0.12);
      color: var(--c-block);
      border-radius: 4px;
      padding: 0.08rem 0.3rem;
      font-family: var(--mono);
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    .used-badge {
      background: rgba(34,197,94,0.12);
      color: var(--c-ans);
      border-radius: 4px;
      padding: 0.08rem 0.3rem;
      font-family: var(--mono);
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    /* gate viz */
    .gate-row { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.6rem; }
    .gate-key { font-size: 0.7rem; color: var(--muted); min-width: 62px; font-family: var(--mono); }

    .gate-bar-wrap {
      flex: 1; position: relative;
      height: 14px; background: var(--surface2); border-radius: 5px; overflow: visible;
    }

    .gate-bar-fill { height: 100%; border-radius: 5px; }

    .gate-thr {
      position: absolute; top: -3px; bottom: -3px; width: 2px;
      background: var(--c-gate); border-radius: 2px;
    }

    .gate-thr-lbl {
      position: absolute; top: -15px;
      font-family: var(--mono); font-size: 0.58rem; color: var(--c-gate);
      white-space: nowrap; transform: translateX(-50%);
    }

    .gate-note { font-size: 0.76rem; color: var(--muted); }
    .gate-note strong { color: var(--text); font-family: var(--mono); }

    /* generation */
    details { border: 1px solid var(--border); border-radius: 7px; margin: 0.65rem 0; }
    summary {
      cursor: pointer; padding: 0.5rem 0.75rem;
      font-family: var(--mono); font-size: 0.65rem; font-weight: 700;
      color: var(--muted); user-select: none; list-style: none; letter-spacing: 0.05em;
    }
    summary::before { content: '▶  '; font-size: 0.58rem; }
    details[open] summary::before { content: '▼  '; }

    .ctx-body {
      padding: 0.6rem 0.75rem 0.75rem;
      font-family: var(--mono); font-size: 0.65rem; color: var(--muted);
      line-height: 1.6; white-space: pre-wrap; word-break: break-word;
      border-top: 1px solid var(--border); max-height: 220px; overflow-y: auto;
    }

    .answer-card {
      background: var(--surface2);
      border-left: 3px solid var(--accent);
      border-radius: 7px;
      padding: 0.85rem 1rem;
      font-size: 0.85rem; line-height: 1.65;
    }

    .refused-card {
      background: rgba(239,68,68,0.07);
      border-left: 3px solid var(--c-block);
      border-radius: 7px;
      padding: 0.85rem 1rem;
      font-size: 0.85rem; line-height: 1.65; color: var(--c-block);
    }

    /* ─── TAB BAR ────────────────────────────────────────────────────────── */
    .tab-bar {
      max-width: 700px;
      margin: 0 auto 2rem;
      display: flex;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--mono);
      font-size: 0.67rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      padding: 0.55rem 1.1rem 0.55rem 0;
      margin-right: 1.4rem;
      margin-bottom: -1px;
      text-transform: uppercase;
      transition: color 0.18s, border-color 0.18s;
    }

    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ─── INGEST PANEL ───────────────────────────────────────────────────── */
    .ingest-layout {
      max-width: 700px;
      margin: 0 auto 1.1rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .drop-zone {
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 2rem 1.2rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
      min-height: 180px;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(99,102,241,0.04);
    }

    .drop-zone.has-file {
      border-color: var(--c-topk);
      border-style: solid;
      background: rgba(52,211,153,0.04);
    }

    .dz-icon {
      font-size: 1.6rem;
      color: var(--muted);
      line-height: 1;
    }

    .dz-text {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .dz-sub { font-size: 0.72rem; color: var(--muted); }

    .dz-link {
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .dz-file {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--c-topk);
      word-break: break-all;
      max-width: 100%;
    }

    /* doc sidebar */
    .doc-sidebar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .doc-sidebar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0.85rem;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0;
    }

    .doc-count {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.08rem 0.4rem;
      font-size: 0.65rem;
      color: var(--accent);
    }

    .doc-list {
      padding: 0.45rem;
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .doc-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.38rem 0.65rem;
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.45rem;
      word-break: break-all;
    }

    .doc-item::before {
      content: '◈';
      color: var(--c-chroma);
      font-size: 0.58rem;
      flex-shrink: 0;
    }

    .doc-empty {
      padding: 1.2rem 0.5rem;
      text-align: center;
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* ingest footer */
    .ingest-footer {
      max-width: 700px;
      margin: 0 auto 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .ingest-status {
      font-family: var(--mono);
      font-size: 0.67rem;
      color: var(--muted);
      flex: 1;
      line-height: 1.5;
    }

    .ingest-status.ok  { color: var(--c-ans); }
    .ingest-status.err { color: var(--c-block); }

    /* INGEST button — emerald palette */
    #ingest-btn {
      background: rgba(34,197,94,0.07);
      border: 1.5px solid var(--c-ans);
      color: var(--c-ans);
      flex-shrink: 0;
    }

    #ingest-btn:hover:not(:disabled) {
      background: rgba(34,197,94,0.16);
      color: #fff;
      filter: drop-shadow(0 0 10px rgba(34,197,94,0.55))
              drop-shadow(0 0 24px rgba(34,197,94,0.25));
    }

    #ingest-btn:active:not(:disabled) {
      background: rgba(34,197,94,0.24);
      filter: drop-shadow(0 0 6px rgba(34,197,94,0.4));
    }

    #ingest-btn:disabled { opacity: 0.35; }

    /* shared button state classes */
    #q-btn.s-running,
    #ingest-btn.s-running {
      border-color: var(--c-embed);
      color: var(--c-embed);
      background: rgba(167,139,250,0.07);
      animation: btn-pulse 1.4s ease-in-out infinite;
    }

    #q-btn.s-done,
    #ingest-btn.s-done {
      border-color: var(--c-ans);
      color: var(--c-ans);
      background: rgba(34,197,94,0.08);
      filter: drop-shadow(0 0 8px rgba(34,197,94,0.45));
    }

    #q-btn.s-error,
    #ingest-btn.s-error {
      border-color: var(--c-block);
      color: var(--c-block);
      background: rgba(239,68,68,0.08);
      filter: drop-shadow(0 0 8px rgba(239,68,68,0.45));
    }
  </style>
</head>
<body>

  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
    <div class="orb orb-5"></div>
  </div>

  <header>
    <div class="header-eyebrow">PolicyGuard RAG</div>
    <h1>Pipeline <span>Trace</span></h1>
    <p>// visualise every stage of retrieval-augmented generation</p>
  </header>

  <!-- ─── TAB BAR ──────────────────────────────────────────────────────── -->
  <div class="tab-bar">
    <button class="tab active" id="tab-query" onclick="setTab('query')">▶&nbsp;&nbsp;Query</button>
    <button class="tab" id="tab-ingest" onclick="setTab('ingest')">⬆&nbsp;&nbsp;Ingest</button>
  </div>

  <!-- ─── INGEST PANEL ─────────────────────────────────────────────────── -->
  <div id="panel-ingest" style="display:none">
    <div class="ingest-layout">
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" accept=".pdf,.txt" style="display:none" />
        <div class="dz-icon">⬆</div>
        <div class="dz-text">Drop a PDF or TXT here</div>
        <div class="dz-sub">or <span class="dz-link" onclick="event.stopPropagation();document.getElementById('file-input').click()">browse files</span></div>
        <div class="dz-file" id="dz-file"></div>
      </div>

      <div class="doc-sidebar">
        <div class="doc-sidebar-head">
          <span>documents in db</span>
          <span id="doc-count" class="doc-count">—</span>
        </div>
        <div id="doc-list" class="doc-list">
          <div class="doc-empty">loading…</div>
        </div>
      </div>
    </div>

    <div class="ingest-footer">
      <div id="ingest-status" class="ingest-status"></div>
      <button id="ingest-btn" class="para-btn" disabled onclick="doIngest()">⬆&nbsp;&nbsp;INGEST</button>
    </div>
  </div>

  <!-- ─── QUERY PANEL ──────────────────────────────────────────────────── -->
  <div id="panel-query">

  <div class="query-wrap">
    <input id="q-in" type="text" placeholder="Ask a policy question…" />
  </div>

  <div class="controls-row">
    <div class="param-group" id="pg-topk">
      <div class="param-label">Top-K Chunks</div>
      <div class="stepper">
        <button onclick="adjustParam('topk', -1)" title="Decrease">−</button>
        <div class="stepper-val" id="val-topk">5</div>
        <button onclick="adjustParam('topk', +1)" title="Increase">+</button>
      </div>
    </div>

    <div class="param-group" id="pg-thr">
      <div class="param-label">Conf. Threshold</div>
      <div class="stepper">
        <button onclick="adjustParam('thr', -1)" title="Decrease">−</button>
        <div class="stepper-val" id="val-thr">0.25</div>
        <button onclick="adjustParam('thr', +1)" title="Increase">+</button>
      </div>
    </div>

    <div style="margin-left:auto; margin-top:1.1rem">
      <button id="q-btn" class="para-btn" onclick="runTrace()">▶&nbsp;&nbsp;RUN</button>
    </div>
  </div>

  <!-- ─── FLOW GRAPH ─────────────────────────────────────────────────── -->
  <div class="graph-section">
    <div class="section-eyebrow">rag pipeline</div>
    <div class="graph-shell">
      <svg id="rag-svg" viewBox="0 0 940 185" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur stdDeviation="4" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="glow-sm" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="2.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
      </svg>
      <div class="status-bar" id="status-bar">enter a question to run the pipeline</div>
    </div>
  </div>

  <div id="error-msg"></div>

  <div class="detail-section">
    <div class="section-eyebrow" id="detail-eyebrow" style="display:none;margin-bottom:.55rem">stage detail</div>
    <div class="pipeline" id="pipeline"></div>
  </div>

  </div><!-- /panel-query -->

  <script>
  // ────────────────────────────────────────────────────────────────────────────
  // GRAPH DEFINITIONS
  // ────────────────────────────────────────────────────────────────────────────
  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.getElementById('rag-svg');

  const CY = 82;   // node center Y
  const R  = 28;   // node radius

  const NODES = [
    { id:'query',  label:'USER QUERY',   sub:'question input',      icon:'⌨',  color:'#22d3ee', cx: 60  },
    { id:'embed',  label:'EMBEDDING',    sub:'text-emb-3-small',    icon:'≈',  color:'#a78bfa', cx: 195 },
    { id:'chroma', label:'CHROMADB',     sub:'vector store',        icon:'⬡',  color:'#fb923c', cx: 335 },
    { id:'topk',   label:'TOP-K CHUNKS', sub:'cosine similarity',   icon:'≡',  color:'#34d399', cx: 475 },
    { id:'gate',   label:'CONF. GATE',   sub:'threshold: 0.25',     icon:'◈',  color:'#fbbf24', cx: 608 },
    { id:'llm',    label:'GPT-4o-mini',  sub:'generation',          icon:'⚡',  color:'#818cf8', cx: 745 },
    { id:'answer', label:'ANSWER',       sub:'',                    icon:'◎',  color:'#22c55e', cx: 876 },
  ];

  // ── helpers ──────────────────────────────────────────────────────────────
  function el(tag, attrs, parent) {
    const e = document.createElementNS(NS, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    if (parent) parent.appendChild(e);
    return e;
  }

  function txt(tag, attrs, content, parent) {
    const e = el(tag, attrs, parent);
    e.textContent = content;
    return e;
  }

  // ── build static graph ───────────────────────────────────────────────────
  function buildGraph() {
    // Connection lines + arrowheads
    for (let i = 0; i < NODES.length - 1; i++) {
      const n1 = NODES[i], n2 = NODES[i+1];
      const x1 = n1.cx + R + 3, x2 = n2.cx - R - 8;
      const cy = CY;

      // line
      el('line', {
        id: `conn-${i}`, class: 'conn',
        x1, y1: cy, x2, y2: cy,
        stroke: '#1c2238',
      }, svg);

      // arrowhead triangle
      const ax = x2 + 1;
      el('polygon', {
        id: `arrow-${i}`, class: 'arrowhead',
        points: `${ax},${cy-4} ${ax+7},${cy} ${ax},${cy+4}`,
        fill: '#1c2238',
      }, svg);
    }

    // Nodes
    NODES.forEach(n => {
      const g = el('g', { id: `g-${n.id}` }, svg);

      // pulse ring (hidden until active)
      el('circle', {
        id: `pulse-${n.id}`, class: 'node-pulse',
        cx: n.cx, cy: CY, r: R,
        stroke: n.color,
      }, g);

      // outer ring
      el('circle', {
        id: `ring-${n.id}`, class: 'node-outer-ring',
        cx: n.cx, cy: CY, r: R + 7,
        stroke: n.color,
      }, g);

      // body
      el('circle', {
        id: `bg-${n.id}`, class: 'node-bg',
        cx: n.cx, cy: CY, r: R,
        stroke: n.color,
      }, g);

      // icon
      txt('text', {
        id: `icon-${n.id}`, class: 'node-icon-text',
        x: n.cx, y: CY - 5, fill: n.color,
        'font-family': "'Segoe UI Emoji','Apple Color Emoji',monospace",
      }, n.icon, g);

      // live data slot (shows chunk count, dims, etc.)
      txt('text', {
        id: `data-${n.id}`, class: 'node-data-text',
        x: n.cx, y: CY + 11, fill: n.color,
      }, '', g);

      // label
      txt('text', {
        id: `lbl-${n.id}`, class: 'node-label-text',
        x: n.cx, y: CY + R + 13,
      }, n.label, g);

      // sublabel
      txt('text', {
        id: `sub-${n.id}`, class: 'node-sub-text',
        x: n.cx, y: CY + R + 21,
      }, n.sub, g);
    });
  }

  buildGraph();

  // ── node state helpers ───────────────────────────────────────────────────
  function lightNode(id, dataStr = '', colorOverride = '') {
    const n = NODES.find(n => n.id === id);
    const c = colorOverride || n.color;

    document.getElementById(`ring-${id}`)?.classList.add('lit');
    document.getElementById(`ring-${id}`)?.setAttribute('stroke', c);
    document.getElementById(`icon-${id}`)?.classList.add('lit');
    document.getElementById(`icon-${id}`)?.setAttribute('fill', c);
    document.getElementById(`lbl-${id}`)?.classList.add('lit');
    document.getElementById(`lbl-${id}`)?.setAttribute('fill', c);

    const pulse = document.getElementById(`pulse-${id}`);
    if (pulse) { pulse.setAttribute('stroke', c); pulse.classList.add('pulsing'); }

    if (dataStr) {
      const d = document.getElementById(`data-${id}`);
      if (d) { d.textContent = dataStr; d.setAttribute('fill', c); d.classList.add('show'); }
    }
  }

  function lightConn(i, color) {
    const line  = document.getElementById(`conn-${i}`);
    const arrow = document.getElementById(`arrow-${i}`);
    if (line)  { line.classList.add('lit'); line.setAttribute('stroke', color); }
    if (arrow) { arrow.setAttribute('fill', color); }
  }

  function resetGraph() {
    NODES.forEach(n => {
      document.getElementById(`ring-${n.id}`)?.classList.remove('lit');
      document.getElementById(`ring-${n.id}`)?.setAttribute('stroke', n.color);
      document.getElementById(`icon-${n.id}`)?.classList.remove('lit');
      document.getElementById(`icon-${n.id}`)?.setAttribute('fill', n.color);
      document.getElementById(`lbl-${n.id}`)?.classList.remove('lit');
      document.getElementById(`lbl-${n.id}`)?.setAttribute('fill', '#5a6480');
      const pulse = document.getElementById(`pulse-${n.id}`);
      if (pulse) { pulse.classList.remove('pulsing'); }
      const data = document.getElementById(`data-${n.id}`);
      if (data) { data.textContent = ''; data.classList.remove('show'); }
    });
    for (let i = 0; i < NODES.length - 1; i++) {
      const line  = document.getElementById(`conn-${i}`);
      const arrow = document.getElementById(`arrow-${i}`);
      if (line)  { line.classList.remove('lit'); line.setAttribute('stroke', '#1c2238'); }
      if (arrow) { arrow.setAttribute('fill', '#1c2238'); }
    }
    // remove stray particles
    svg.querySelectorAll('.particle').forEach(p => p.remove());
  }

  // ── particle animation ───────────────────────────────────────────────────
  function particle(fromIdx, toIdx, color, ms = 320) {
    return new Promise(resolve => {
      const n1 = NODES[fromIdx], n2 = NODES[toIdx];
      const x1 = n1.cx + R + 3, x2 = n2.cx - R - 8;
      const y  = CY;

      const p = el('circle', {
        class: 'particle', r: '4.5',
        fill: color, cx: x1, cy: y,
        filter: 'url(#glow-sm)', opacity: '0.95',
      }, svg);

      const t0 = performance.now();
      (function step(now) {
        const t = Math.min((now - t0) / ms, 1);
        const e = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
        p.setAttribute('cx', x1 + (x2 - x1) * e);
        if (t < 1) requestAnimationFrame(step);
        else { p.remove(); resolve(); }
      })(t0);
    });
  }

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  function setStatus(msg, color = '') {
    const el = document.getElementById('status-bar');
    el.textContent = msg;
    el.style.color = color || '';
  }

  // ── full graph animation sequence ────────────────────────────────────────
  async function playGraph(d) {
    const P = 310, GAP = 55;

    setStatus('embedding question vector…', '#a78bfa');
    lightNode('query');
    await sleep(GAP);
    lightConn(0, NODES[0].color);
    await particle(0, 1, NODES[0].color, P);

    lightNode('embed', '1536 dims');
    await sleep(GAP);
    setStatus('querying chromadb vector store…', '#fb923c');
    lightConn(1, NODES[1].color);
    await particle(1, 2, NODES[1].color, P);

    lightNode('chroma', `${d.total_chunks_in_collection} chunks`);
    await sleep(GAP);
    setStatus(`computing cosine similarity — top ${d.top_k}…`, '#34d399');
    lightConn(2, NODES[2].color);
    await particle(2, 3, NODES[2].color, P);

    lightNode('topk', `k = ${d.top_k}`);
    await sleep(GAP);
    setStatus(`confidence gate check… threshold: ${d.confidence_threshold}`, '#fbbf24');
    lightConn(3, NODES[3].color);
    await particle(3, 4, NODES[3].color, P);

    const gateColor = d.gate_passed ? '#22c55e' : '#ef4444';
    lightNode('gate', d.best_score.toFixed(3), gateColor);
    // update gate icon
    const gateIcon = document.getElementById('icon-gate');
    if (gateIcon) gateIcon.textContent = d.gate_passed ? '✓' : '✕';
    await sleep(GAP);

    if (d.gate_passed) {
      setStatus('generating answer with gpt-4o-mini…', '#818cf8');
      lightConn(4, gateColor);
      await particle(4, 5, gateColor, P);
      lightNode('llm', 't=0.1');
      await sleep(GAP);

      setStatus('pipeline complete', '#22c55e');
      lightConn(5, NODES[5].color);
      await particle(5, 6, NODES[5].color, P);
      lightNode('answer', 'done', '#22c55e');
    } else {
      setStatus('gate blocked — score below 0.25, no generation', '#ef4444');
      // dim downstream nodes
      ['llm','answer'].forEach(id => {
        document.getElementById(`icon-${id}`)?.setAttribute('fill', '#1c2238');
      });
    }
  }

  // ────────────────────────────────────────────────────────────────────────────
  // STAGE DETAIL CARDS
  // ────────────────────────────────────────────────────────────────────────────
  const qIn   = document.getElementById('q-in');
  const qBtn  = document.getElementById('q-btn');
  const errEl = document.getElementById('error-msg');
  const pipeEl = document.getElementById('pipeline');

  qIn.addEventListener('keydown', e => { if (e.key === 'Enter') runTrace(); });

  // ── parameter steppers ───────────────────────────────────────────────────
  const params = { topk: 5, thr: 0.25 };
  const TOPK_MIN = 1, TOPK_MAX = 20;
  const THR_MIN  = 0.05, THR_MAX = 0.95, THR_STEP = 0.05;

  function adjustParam(key, dir) {
    if (key === 'topk') {
      params.topk = Math.min(TOPK_MAX, Math.max(TOPK_MIN, params.topk + dir));
      document.getElementById('val-topk').textContent = params.topk;
    } else {
      params.thr = Math.min(THR_MAX, Math.max(THR_MIN,
        Math.round((params.thr + dir * THR_STEP) * 100) / 100));
      document.getElementById('val-thr').textContent = params.thr.toFixed(2);
      // keep gate sublabel in sync
      const sub = document.getElementById('sub-gate');
      if (sub) sub.textContent = `threshold: ${params.thr.toFixed(2)}`;
    }
    // flash highlight
    const pg = document.getElementById(key === 'topk' ? 'pg-topk' : 'pg-thr');
    pg.classList.add('highlight');
    setTimeout(() => pg.classList.remove('highlight'), 600);
  }

  function barClass(s) { return s >= 0.6 ? 'bar-hi' : s >= 0.25 ? 'bar-md' : 'bar-lo'; }
  function pct(s) { return Math.max(0, Math.min(100, s * 100)).toFixed(1); }
  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function reveal(el, ms) { setTimeout(() => el.classList.add('visible'), ms); }

  function setBtnState(state) {
    qBtn.classList.remove('s-running', 's-done', 's-error');
    qBtn.disabled = false;
    if (state === 'running') {
      qBtn.classList.add('s-running');
      qBtn.disabled = true;
      qBtn.innerHTML = '◌&nbsp;&nbsp;RUNNING';
    } else if (state === 'done') {
      qBtn.classList.add('s-done');
      qBtn.innerHTML = '✓&nbsp;&nbsp;DONE';
      setTimeout(() => setBtnState('idle'), 2200);
    } else if (state === 'error') {
      qBtn.classList.add('s-error');
      qBtn.innerHTML = '✕&nbsp;&nbsp;ERROR';
      setTimeout(() => setBtnState('idle'), 2500);
    } else {
      qBtn.innerHTML = '▶&nbsp;&nbsp;RUN';
    }
  }

  async function runTrace() {
    const q = qIn.value.trim();
    if (!q) return;

    setBtnState('running');
    errEl.style.display = 'none';
    pipeEl.innerHTML = '';
    document.getElementById('detail-eyebrow').style.display = 'none';
    resetGraph();
    setStatus('sending request…', '#6366f1');

    let data;
    try {
      const res = await fetch('/query/trace', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q, top_k: params.topk, confidence_threshold: params.thr }),
      });
      if (!res.ok) {
        const detail = await res.json().catch(() => ({}));
        throw new Error(detail.detail || `HTTP ${res.status}`);
      }
      data = await res.json();
    } catch (err) {
      errEl.textContent = 'Error: ' + err.message;
      errEl.style.display = 'block';
      setStatus('error', '#ef4444');
      setBtnState('error');
      return;
    }

    // run graph animation (non-blocking) + render cards with slight offset
    playGraph(data);
    setTimeout(() => renderCards(data), 150);
    setBtnState('done');
  }

  function card(num, title, body, extraClass = '') {
    const d = document.createElement('div');
    d.className = 'stage' + (extraClass ? ' ' + extraClass : '');
    d.innerHTML = `<div class="stage-hd">
        <div class="stage-num">${num}</div>
        <div class="stage-title">${title}</div>
      </div>${body}`;
    return d;
  }

  function conn() {
    const d = document.createElement('div');
    d.className = 'connector';
    d.innerHTML = '↓';
    return d;
  }

  function renderCards(d) {
    document.getElementById('detail-eyebrow').style.display = '';
    let delay = 180;
    const STEP = 130;

    function add(el) {
      pipeEl.appendChild(el);
      reveal(el, delay);
      delay += STEP;
    }
    function addC() {
      const c = conn();
      pipeEl.appendChild(c);
      setTimeout(() => c.classList.add('visible'), delay);
      delay += 55;
    }

    // 1 — Question
    add(card(1, 'User Query',
      `<div class="q-text">${esc(d.question)}</div>`));
    addC();

    // 2 — Embedding
    add(card(2, 'Embedding',
      `<div class="kv">
        <span class="kv-k">Model</span>      <span class="kv-v">${esc(d.embedding_model)}</span>
        <span class="kv-k">Dimensions</span> <span class="kv-v">${d.embedding_dimensions.toLocaleString()}</span>
       </div>`));
    addC();

    // 3 — Vector Search
    const usedCount = d.retrieval_results.filter(c => c.used_in_context).length;
    const rows = d.retrieval_results.map(c => {
      const bc      = barClass(c.cosine_similarity);
      const w       = pct(Math.max(0, c.cosine_similarity));
      const used    = c.used_in_context;
      const itemCls = used ? 'chunk-item' : 'chunk-item filtered';
      const badge   = used
        ? '<span class="used-badge">SENT TO LLM</span>'
        : '<span class="filtered-badge">FILTERED OUT</span>';
      return `<div class="${itemCls}">
        <div class="chunk-row">
          <span class="chunk-rank">#${c.rank}</span>
          <span class="chunk-doc">${esc(c.document)}</span>
          ${badge}
          <span class="chunk-scores">
            <span title="cosine similarity">cos ${c.cosine_similarity.toFixed(4)}</span>
            <span title="L2 distance">L2 ${c.l2_distance.toFixed(4)}</span>
            <span title="chunk index">idx ${c.chunk_index}</span>
          </span>
        </div>
        <div class="bar-wrap"><div class="bar ${bc}" style="width:${w}%"></div></div>
        <div class="chunk-exc">${esc(c.excerpt)}</div>
      </div>`;
    }).join('');

    const filteredCount = d.retrieval_results.length - usedCount;
    const filterNote = filteredCount > 0
      ? ` — <strong style="color:var(--c-block)">${filteredCount} filtered out</strong> (cos < ${d.confidence_threshold}), <strong style="color:var(--c-ans)">${usedCount} sent to LLM</strong>`
      : ` — <strong style="color:var(--c-ans)">all ${usedCount} sent to LLM</strong>`;

    add(card(3, 'Vector Search',
      `<div class="search-meta">searched <strong>${d.total_chunks_in_collection}</strong> chunks — retrieved top <strong>${d.top_k}</strong>${filterNote}</div>
       <div class="chunk-list">${rows}</div>`));
    addC();

    // 4 — Confidence Gate
    const pass  = d.gate_passed;
    const badge = pass
      ? '<span class="badge badge-pass">PASS</span>'
      : '<span class="badge badge-block">BLOCKED</span>';
    const bfill = pass ? 'bar-hi' : 'bar-lo';
    const bw    = pct(Math.max(0, d.best_score));
    const tw    = pct(d.confidence_threshold);

    add(card(4, 'Confidence Gate',
      `<div class="stage-hd" style="margin-bottom:.55rem">${badge}</div>
       <div class="gate-row">
         <div class="gate-key">best score</div>
         <div class="gate-bar-wrap">
           <div class="gate-bar-fill ${bfill}" style="height:100%;border-radius:5px;width:${bw}%"></div>
           <div class="gate-thr" style="left:${tw}%">
             <div class="gate-thr-lbl">${d.confidence_threshold}</div>
           </div>
         </div>
       </div>
       <div class="gate-note">Score <strong>${d.best_score.toFixed(4)}</strong> vs threshold <strong>${d.confidence_threshold}</strong> — ${pass ? 'evidence quality sufficient, proceeding to generation.' : 'below threshold, generation blocked.'}</div>`,
      'gate-stage ' + (pass ? 'gate-pass' : 'gate-block')));
    addC();

    // 5 — LLM Generation
    if (!pass) {
      add(card(5, 'LLM Generation',
        `<div class="refused-card">${esc(d.reason || 'Confidence gate blocked generation.')}</div>`));
    } else {
      add(card(5, 'LLM Generation',
        `<div class="kv" style="margin-bottom:.7rem">
          <span class="kv-k">Model</span>          <span class="kv-v">${esc(d.generation_model || '')}</span>
          <span class="kv-k">Temperature</span>    <span class="kv-v">${d.generation_temperature}</span>
          <span class="kv-k">Context chunks</span> <span class="kv-v">${usedCount} of ${d.retrieval_results.length} retrieved</span>
         </div>
         <details>
           <summary>CONTEXT INJECTED INTO PROMPT</summary>
           <pre class="ctx-body">${esc(d.context_sent_to_llm || '')}</pre>
         </details>
         <div class="answer-card">${esc(d.answer || '')}</div>`));
    }
  }

  // ────────────────────────────────────────────────────────────────────────────
  // TAB SWITCHING
  // ────────────────────────────────────────────────────────────────────────────
  function setTab(name) {
    document.getElementById('panel-ingest').style.display = name === 'ingest' ? '' : 'none';
    document.getElementById('panel-query').style.display  = name === 'query'  ? '' : 'none';
    document.getElementById('tab-ingest').classList.toggle('active', name === 'ingest');
    document.getElementById('tab-query').classList.toggle('active',  name === 'query');
    if (name === 'ingest') loadDocList();
  }

  // ────────────────────────────────────────────────────────────────────────────
  // INGEST PANEL
  // ────────────────────────────────────────────────────────────────────────────
  let selectedFile = null;

  (function initDrop() {
    const dz = document.getElementById('drop-zone');
    const fi = document.getElementById('file-input');

    dz.addEventListener('click', () => fi.click());

    fi.addEventListener('change', () => {
      if (fi.files[0]) setFile(fi.files[0]);
    });

    dz.addEventListener('dragover', e => {
      e.preventDefault();
      dz.classList.add('dragover');
    });

    dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));

    dz.addEventListener('drop', e => {
      e.preventDefault();
      dz.classList.remove('dragover');
      const f = e.dataTransfer.files[0];
      if (f) setFile(f);
    });
  })();

  function setFile(f) {
    selectedFile = f;
    const dz = document.getElementById('drop-zone');
    dz.classList.add('has-file');
    document.getElementById('dz-file').textContent = f.name;
    document.getElementById('ingest-btn').disabled = false;
    const st = document.getElementById('ingest-status');
    st.textContent = '';
    st.className = 'ingest-status';
  }

  async function loadDocList() {
    try {
      const res  = await fetch('/documents');
      const data = await res.json();
      document.getElementById('doc-count').textContent = data.total;
      const list = document.getElementById('doc-list');
      if (data.documents.length === 0) {
        list.innerHTML = '<div class="doc-empty">no documents ingested yet</div>';
      } else {
        list.innerHTML = data.documents.map(d => `<div class="doc-item">${esc(d)}</div>`).join('');
      }
    } catch (_) {
      document.getElementById('doc-list').innerHTML = '<div class="doc-empty">could not load</div>';
    }
  }

  function setIngestBtn(state) {
    const btn = document.getElementById('ingest-btn');
    btn.classList.remove('s-running', 's-done', 's-error');
    btn.disabled  = false;
    if (state === 'running') {
      btn.classList.add('s-running');
      btn.disabled  = true;
      btn.innerHTML = '◌&nbsp;&nbsp;UPLOADING';
    } else if (state === 'done') {
      btn.classList.add('s-done');
      btn.innerHTML = '✓&nbsp;&nbsp;DONE';
      setTimeout(() => { btn.classList.remove('s-done'); btn.disabled = true; btn.innerHTML = '⬆&nbsp;&nbsp;INGEST'; }, 2200);
    } else if (state === 'error') {
      btn.classList.add('s-error');
      btn.innerHTML = '✕&nbsp;&nbsp;ERROR';
      setTimeout(() => { btn.classList.remove('s-error'); btn.disabled = !selectedFile; btn.innerHTML = '⬆&nbsp;&nbsp;INGEST'; }, 2500);
    } else {
      btn.innerHTML = '⬆&nbsp;&nbsp;INGEST';
      btn.disabled  = !selectedFile;
    }
  }

  async function doIngest() {
    if (!selectedFile) return;

    setIngestBtn('running');
    const st = document.getElementById('ingest-status');
    st.textContent = `uploading ${selectedFile.name}…`;
    st.className   = 'ingest-status';

    try {
      const form = new FormData();
      form.append('file', selectedFile);
      const res = await fetch('/ingest', { method: 'POST', body: form });
      if (!res.ok) {
        const detail = await res.json().catch(() => ({}));
        throw new Error(detail.detail || `HTTP ${res.status}`);
      }
      const data = await res.json();
      st.textContent = `✓  "${data.filename}" — ${data.chunks_stored} chunks stored`;
      st.className   = 'ingest-status ok';
      setIngestBtn('done');
      // reset file selection
      selectedFile = null;
      document.getElementById('drop-zone').classList.remove('has-file');
      document.getElementById('dz-file').textContent  = '';
      document.getElementById('file-input').value     = '';
      await loadDocList();
    } catch (e) {
      st.textContent = `✕  ${e.message}`;
      st.className   = 'ingest-status err';
      setIngestBtn('error');
    }
  }

  // pre-load doc list in the background so it's ready when user opens ingest tab
  loadDocList();

  </script>
</body>
</html>
